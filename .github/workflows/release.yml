name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install -g npm@latest # Trusted Publishing needs npm >= 11.5.1
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test
      # No NPM_TOKEN: auth comes from GitHub's OIDC token via Trusted Publishing,
      # configured at npmjs.com → @fsichi/awswiz → Settings → Trusted Publisher.
      - run: npm publish --provenance --access public
